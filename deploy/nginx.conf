# Nginx Configuration for Collabryx on AWS EC2
# Ubuntu 22.04: Usually goes in /etc/nginx/sites-available/default

server {
    listen 80;
    server_name _; # Catch-all for any domain pointing to this IP

    # Root directory for static frontend files
    root /home/ubuntu/collabryx/frontend/dist;
    index index.html;

    # Handle React routing: all unknown requests fall back to index.html
    location / {
        try_files $uri /index.html;
    }

    # Proxy /api requests to the Node.js backend port 3000
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Handle WebSocket upgrades for Socket.io
    location /socket.io/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security: Disable access to hidden files
    location ~ /\. {
        deny all;
    }
}
